const Puzzles = (function(){
//PUZZLE_PURE_START
const SR = Math.random;
function ri(a,b){ return a + Math.floor(SR()*(b-a+1)); }
function pick(a){ return a[Math.floor(SR()*a.length)]; }
function shuffle(a){ const r=a.slice(); for(let i=r.length-1;i>0;i--){ const j=Math.floor(SR()*(i+1)); const t=r[i];r[i]=r[j];r[j]=t; } return r; }
function range1(n){ const r=[]; for(let i=1;i<=n;i++) r.push(i); return r; }

/* --- заполненная сетка: латинский квадрат, опц. блоки судоку --- */
function genFilledGrid(n, boxR, boxC){
  const g=[]; for(let i=0;i<n;i++) g.push(new Array(n).fill(0));
  function ok(r,c,v){
    for(let i=0;i<n;i++){ if(g[r][i]===v || g[i][c]===v) return false; }
    if(boxR){
      const br=Math.floor(r/boxR)*boxR, bc=Math.floor(c/boxC)*boxC;
      for(let i=0;i<boxR;i++) for(let j=0;j<boxC;j++) if(g[br+i][bc+j]===v) return false;
    }
    return true;
  }
  function fill(pos){
    if(pos===n*n) return true;
    const r=Math.floor(pos/n), c=pos%n;
    for(const v of shuffle(range1(n))){
      if(ok(r,c,v)){ g[r][c]=v; if(fill(pos+1)) return true; g[r][c]=0; }
    }
    return false;
  }
  fill(0);
  return g;
}

/* --- судоку: счётчик решений с отсечкой (MRV) --- */
function countSudoku(g, n, boxR, boxC, cap){
  let count=0;
  function candidates(r,c){
    const used=new Set();
    for(let i=0;i<n;i++){ used.add(g[r][i]); used.add(g[i][c]); }
    if(boxR){ const br=Math.floor(r/boxR)*boxR, bc=Math.floor(c/boxC)*boxC;
      for(let i=0;i<boxR;i++) for(let j=0;j<boxC;j++) used.add(g[br+i][bc+j]); }
    const cands=[]; for(let v=1;v<=n;v++) if(!used.has(v)) cands.push(v);
    return cands;
  }
  function step(){
    if(count>=cap) return;
    let br=-1, bc=-1, bcands=null;
    outer:
    for(let r=0;r<n;r++) for(let c=0;c<n;c++){
      if(g[r][c]!==0) continue;
      const cands=candidates(r,c);
      if(bcands===null || cands.length<bcands.length){ br=r; bc=c; bcands=cands; if(bcands.length===0) break outer; }
    }
    if(bcands===null){ count++; return; }
    for(const v of bcands){
      g[br][bc]=v; step(); g[br][bc]=0;
      if(count>=cap) return;
    }
  }
  step();
  return count;
}

function genSudoku(diff){
  const n = diff<=6 ? 4 : 6;
  const boxR = 2, boxC = n===4 ? 2 : 3;
  const sol = genFilledGrid(n, boxR, boxC);
  const g = sol.map(r=>r.slice());
  const targetGivens = n===4 ? (diff<=3?10 : diff<=5?8 : 7) : (diff<=8?20 : 16);
  let givens = n*n;
  for(const id of shuffle([...Array(n*n)].map((_,i)=>i))){
    if(givens<=targetGivens) break;
    const r=Math.floor(id/n), c=id%n, keep=g[r][c];
    g[r][c]=0;
    if(countSudoku(g.map(x=>x.slice()), n, boxR, boxC, 2)===1) givens--;
    else g[r][c]=keep;
  }
  const empties=[]; for(let r=0;r<n;r++) for(let c=0;c<n;c++) if(g[r][c]===0) empties.push([r,c]);
  const t=pick(empties);
  return { n, boxR, boxC, grid:g, sol, target:t, answer:sol[t[0]][t[1]], givens };
}

/* --- KenKen: латинский квадрат + «клети» с арифметикой --- */
const OPSYM = { "+":"+", "-":"−", "x":"×", "/":"÷", "=":"" };
function cageValue(op, vals){
  if(op==="=") return vals[0];
  if(op==="+") return vals.reduce((a,b)=>a+b,0);
  if(op==="x") return vals.reduce((a,b)=>a*b,1);
  const hi=Math.max(vals[0],vals[1]), lo=Math.min(vals[0],vals[1]);
  return op==="-" ? hi-lo : hi/lo;
}
function countKenKen(n, cages, cageId, cap){
  const g=[]; for(let i=0;i<n;i++) g.push(new Array(n).fill(0));
  let count=0;
  function cageOk(cid){
    const cage=cages[cid];
    const vals=[]; let full=true;
    for(const i of cage.cells){ const v=g[Math.floor(i/n)][i%n]; if(v===0) full=false; else vals.push(v); }
    if(cage.op==="=") return vals.length===0 || vals[0]===cage.val;
    if(cage.op==="+"){ const s=vals.reduce((a,b)=>a+b,0); return full ? s===cage.val : s<cage.val; }
    if(cage.op==="x"){ const p=vals.reduce((a,b)=>a*b,1); return full ? p===cage.val : cage.val%p===0; }
    if(!full) return true;
    const hi=Math.max(vals[0],vals[1]), lo=Math.min(vals[0],vals[1]);
    return cage.op==="-" ? hi-lo===cage.val : (hi%lo===0 && hi/lo===cage.val);
  }
  function ok(r,c,v){
    for(let i=0;i<n;i++) if(g[r][i]===v || g[i][c]===v) return false;
    g[r][c]=v;
    const good=cageOk(cageId[r*n+c]);
    g[r][c]=0;
    return good;
  }
  function step(pos){
    if(count>=cap) return;
    if(pos===n*n){ count++; return; }
    const r=Math.floor(pos/n), c=pos%n;
    for(let v=1;v<=n;v++){
      if(ok(r,c,v)){ g[r][c]=v; step(pos+1); g[r][c]=0; if(count>=cap) return; }
    }
  }
  step(0);
  return count;
}
function genKenKen(diff){
  const n = diff<=6 ? 3 : 4;
  for(let attempt=0; attempt<300; attempt++){
    const sol = genFilledGrid(n, 0, 0);
    const cageId = new Array(n*n).fill(-1);
    const cages=[];
    for(const start of shuffle([...Array(n*n)].map((_,i)=>i))){
      if(cageId[start]!==-1) continue;
      const cid=cages.length, cells=[start];
      cageId[start]=cid;
      const targetSize = pick(diff>=9 ? [2,2,3] : [1,2,2,2,3]);
      while(cells.length<targetSize){
        const opts=[];
        for(const cell of cells){
          const r=Math.floor(cell/n), c=cell%n;
          if(r>0 && cageId[cell-n]===-1) opts.push(cell-n);
          if(r<n-1 && cageId[cell+n]===-1) opts.push(cell+n);
          if(c>0 && cageId[cell-1]===-1) opts.push(cell-1);
          if(c<n-1 && cageId[cell+1]===-1) opts.push(cell+1);
        }
        if(!opts.length) break;
        const nb=pick(opts); cageId[nb]=cid; cells.push(nb);
      }
      cages.push({ cells });
    }
    for(const cage of cages){
      const vals=cage.cells.map(i=>sol[Math.floor(i/n)][i%n]);
      if(vals.length===1) cage.op="=";
      else if(vals.length===2){
        const hi=Math.max(vals[0],vals[1]), lo=Math.min(vals[0],vals[1]);
        const ops=["+","-","x"];
        if(hi%lo===0) ops.push("/");
        cage.op=pick(ops);
      } else cage.op=pick(["+","x"]);
      cage.val=cageValue(cage.op, vals);
    }
    if(countKenKen(n, cages, cageId, 2)!==1) continue;
    const multi=[...Array(n*n)].map((_,i)=>i).filter(i=>cages[cageId[i]].cells.length>1);
    const t = pick(multi.length?multi:[...Array(n*n)].map((_,i)=>i));
    return { n, cages, cageId, sol, target:[Math.floor(t/n), t%n], answer:sol[Math.floor(t/n)][t%n] };
  }
  // не должно случаться (вероятность уникальности высока) — но на всякий случай проще клети
  return genKenKen(Math.max(1, diff-2));
}

/* --- магический квадрат 3×3: Ло Шу × поворот/отражение × (a·x+b) --- */
const LOSHU=[[2,7,6],[9,5,1],[4,3,8]];
const MAGIC_LINES=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
function magicPropagate(flat, S, hiddenSet){
  // решаем распространением: линия с одной неизвестной; возвращает массив значений или null
  const v=flat.map((x,i)=>hiddenSet.has(i)?null:x);
  let progress=true;
  while(progress){
    progress=false;
    for(const L of MAGIC_LINES){
      const unk=L.filter(i=>v[i]===null);
      if(unk.length===1){
        v[unk[0]] = S - L.filter(i=>v[i]!==null).reduce((s,i)=>s+v[i],0);
        progress=true;
      }
    }
  }
  return v.every(x=>x!==null) ? v : null;
}
function genMagic(diff){
  let m=LOSHU.map(r=>r.slice());
  const rot=g=>[[g[2][0],g[1][0],g[0][0]],[g[2][1],g[1][1],g[0][1]],[g[2][2],g[1][2],g[0][2]]];
  const k=ri(0,3); for(let i=0;i<k;i++) m=rot(m);
  if(SR()<0.5) m=m.map(r=>r.slice().reverse());
  const a = diff<=2?1 : ri(1, diff<=5?2:3);
  const b = ri(0, diff<=2?6:14);
  m=m.map(row=>row.map(x=>a*x+b));
  const S=3*(a*5+b);
  const flat=m.flat();
  const wantHide = diff<=2?2 : diff<=4?3 : diff<=6?4 : 5;
  const giveS = diff<=4;
  for(let hc=wantHide; hc>=1; hc--){
    for(let attempt=0; attempt<300; attempt++){
      const hidden=new Set(shuffle([...Array(9)].map((_,i)=>i)).slice(0,hc));
      if(!giveS && !MAGIC_LINES.some(L=>L.every(i=>!hidden.has(i)))) continue;
      const solved=magicPropagate(flat, S, hidden);
      if(!solved) continue;
      const target=pick([...hidden]);
      return { m, S, hidden:[...hidden].sort((x,y)=>x-y), target, giveS, answer:flat[target] };
    }
  }
  // недостижимо: hc=1 всегда решается
  return genMagic(diff);
}

/* --- нонограмма: выбрать картинку под числа-подсказки --- */
function lineClues(arr){
  const res=[]; let run=0;
  for(const x of arr){ if(x) run++; else { if(run) res.push(run); run=0; } }
  if(run) res.push(run);
  return res.length?res:[0];
}
function nonoClues(g){
  const n=g.length;
  return { rows:g.map(lineClues), cols:[...Array(n)].map((_,c)=>lineClues(g.map(r=>r[c]))) };
}
function genNono(diff){
  const n = diff<=3?4 : diff<=7?5 : 6;
  let grid=null;
  for(let t=0;t<200;t++){
    const g=[...Array(n)].map(()=>[...Array(n)].map(()=>SR()<0.55?1:0));
    const total=g.flat().reduce((s,x)=>s+x,0);
    if(total>=n && total<=n*n-n){ grid=g; break; }
  }
  if(!grid) return genNono(diff);
  const clueKey=g=>JSON.stringify(nonoClues(g));
  const cellKey=g=>g.flat().join("");
  const correct=clueKey(grid);
  const seen=new Set([cellKey(grid)]);
  const dists=[];
  let guard=0;
  while(dists.length<3 && guard++<600){
    const g2=grid.map(r=>r.slice());
    const flips=ri(1, 1+Math.floor(diff/4));
    for(let f=0;f<flips;f++){ const r=ri(0,n-1), c=ri(0,n-1); g2[r][c]^=1; }
    const ck=cellKey(g2);
    if(seen.has(ck) || clueKey(g2)===correct) continue;
    seen.add(ck); dists.push(g2);
  }
  if(dists.length<3) return genNono(diff);
  const opts=shuffle([{g:grid,ok:true}, ...dists.map(g=>({g,ok:false}))]);
  const c=nonoClues(grid);
  return { n, rows:c.rows, cols:c.cols, options:opts.map(o=>o.g), answer:opts.findIndex(o=>o.ok), grid };
}

  const now = Date.now();
  const dueMistakes = state.mistakes.filter(m => m.module === moduleId && (m.due != null ? m.due : 0) <= now);
  if(dueMistakes.length > 0 && Math.random() < 0.35){
    // выбираем самую «просроченную» (наименьший due)
    dueMistakes.sort((a, b) => (a.due != null ? a.due : 0) - (b.due != null ? b.due : 0));
    const mst = dueMistakes[0];
    const task = {
      module: mst.module, question: mst.question, answerType: mst.answerType,
      answer: mst.answer, choices: mst.choices ? mst.choices.slice() : null,
      explanation: mst.explanation, hint: mst.hint, diff: mst.diff,
      chess: mst.chess, scratch: mst.scratch, code: mst.code || null,
      board: mst.board ? mst.board.slice() : null, turn: mst.turn || null,
      blocksHTML: mst.blocksHTML || null,
      spatial: mst.spatial, spatialType: mst.spatialType || null,
      puzzle: mst.puzzle, puzzleType: mst.puzzleType || null,
      visualHTML: mst.visualHTML || null, choiceHTML: mst.choiceHTML ? mst.choiceHTML.slice() : null,
      noAnswerReveal: !!mst.noAnswerReveal,
      hints: mst.hints || (mst.hint ? [mst.hint] : mst.explanation ? [mst.explanation] : ["Подсказок нет."]),
      topic: mst.topic || null,
      __sr: true, __mid: mst.mid,
    };
    // diff и module уже проставлены выше
    return task;
  }

  const diff = Math.min(ratingToDiff(state.ratings[moduleId]), moduleMaxDiff(moduleId));
  const recent = recentTasks[moduleId];
  let task, sig, tries = 0;
  do {
    task = genOnce(moduleId, diff);
    sig = taskSignature(task);
    tries++;
  } while(recent.includes(sig) && tries < 30);
  recent.push(sig);
  const cap = moduleId === "chess" ? 2 : 6;
  while(recent.length > cap) recent.shift();
  task.diff = task.diffOverride || diff;
  task.module = moduleId;
  return task;
}

let _audioCtx = null;
function audioCtx(){
  if(_audioCtx === null){
    try { _audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ _audioCtx = false; }
  }
  return _audioCtx || null;
}
// Сыграть короткую ноту
function beep(freq, startAt, dur, type, gainPeak){
  const ac = audioCtx(); if(!ac) return;
  const t0 = ac.currentTime + startAt;
  const osc = ac.createOscillator();
  const g = ac.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(gainPeak || 0.18, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  osc.connect(g); g.connect(ac.destination);
  osc.start(t0); osc.stop(t0 + dur + 0.02);
}
function playCorrect(){
  if(!state.soundOn) return;
  const ac = audioCtx(); if(ac && ac.state === "suspended") ac.resume();
  beep(660, 0, 0.12, "sine", 0.18);   // до-ми-соль вверх
  beep(880, 0.10, 0.14, "sine", 0.18);
  beep(1175, 0.21, 0.18, "sine", 0.16);
}
function playWrong(){
  if(!state.soundOn) return;
  const ac = audioCtx(); if(ac && ac.state === "suspended") ac.resume();
  beep(220, 0, 0.18, "sawtooth", 0.12);

}

  if(!state.soundOn) return;

// Конфетти на канвасе
function confetti(){
  const cv = document.createElement("canvas");
  cv.className = "confetti-canvas";
  cv.width = window.innerWidth; cv.height = window.innerHeight;
  document.body.appendChild(cv);
  const ctx = cv.getContext("2d");
  const colors = ["#4f8cff","#7c5cff","#3fb950","#e3b341","#f85149","#ff8c1a"];
  const N = 120;
  const parts = [];
  for(let i=0;i<N;i++){
    parts.push({
      x: cv.width/2 + (Math.random()-0.5)*cv.width*0.3,
      y: cv.height*0.35 + (Math.random()-0.5)*60,
      vx: (Math.random()-0.5)*10,
      vy: Math.random()*-9 - 3,
      g: 0.25 + Math.random()*0.15,
      size: 5 + Math.random()*7,
      color: colors[Math.floor(Math.random()*colors.length)],
      rot: Math.random()*Math.PI, vr: (Math.random()-0.5)*0.3,
    });
  }
  let frame = 0;
  function tick(){
    ctx.clearRect(0,0,cv.width,cv.height);
    parts.forEach(p=>{
      p.vy += p.g; p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size*0.6);
      ctx.restore();
    });
    frame++;
    if(frame < 110) requestAnimationFrame(tick);
    else cv.remove();
  }
  requestAnimationFrame(tick);
}

// Перевод хода в шахматной нотации в понятную запись с полными русскими названиями фигур
const RU_PIECE = { K:"Король", Q:"Ферзь", R:"Ладья", B:"Слон", N:"Конь" };
// reveal=false (по умолчанию, для кнопок вариантов): только сам ход без аннотаций
//   «мат»/«шах»/«вилка» — иначе подпись выдаёт правильный ответ.
// reveal=true (показ верного ответа в разборе/после ответа): с полной аннотацией.
function chessMoveLabel(s, reveal){
  const m = String(s).match(/^([KQRBN])(x?)([a-h][1-8])([+#]?)\s*(?:\((.+)\))?$/);
  if(!m) return String(s);
  let txt = RU_PIECE[m[1]] + (m[2] === "x" ? " берёт " : " на ") + m[3];
  if(!reveal) return txt;
  const note = m[5], suff = m[4];
  if(note && /мат/.test(note)) txt += " — " + note;        // напр. «спёртый мат»
  else if(suff === "#") txt += " — мат";
  else if(suff === "+") txt += " — шах" + (note ? ` (${note})` : "");
  else if(note) txt += ` (${note})`;
  return txt;
}
function choiceLabel(task, val, reveal){ return task.chess ? chessMoveLabel(val, reveal) : String(val); }

        <button class="btn" id="checkBtn">Проверить</button>
      </div>`;
  }

  app.innerHTML = `
    <div class="panel fade-in">
      <div class="taskhead">
        <button class="backbtn" id="back">${task.__review ? "← К ошибкам" : "← В меню"}</button>
        <span class="badge">${m.icon} ${m.title} • ур. ${task.diff}/${moduleMaxDiff(moduleId)} ${diffDots(task.diff, moduleMaxDiff(moduleId))}${task.__review ? " • разбор" : task.__sr ? " • повторение" : ""}</span>
      </div>
      ${body}
      ${answerArea}
      <button class="hintbtn" id="hintBtn">💡 Подсказка (1/${(task.hints && task.hints.length > 0 ? task.hints : (task.hint ? [task.hint] : task.explanation ? [task.explanation] : [""])).length})</button>
      <div class="hint" id="hint"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions" id="actions"></div>
    </div>`;

  document.getElementById("back").addEventListener("click", task.__review ? renderReview : renderHome);

  // B2: пошаговые подсказки
  (function(){
    const hintList = (task.hints && task.hints.length > 0)
      ? task.hints
      : task.hint ? [task.hint]
      : task.explanation ? [task.explanation]
      : ["Подсказок нет."];
    const total = hintList.length;
    let revealed = 0;
    const hintBtn = document.getElementById("hintBtn");
    const hintDiv = document.getElementById("hint");
    hintBtn.addEventListener("click", ()=>{
      if(revealed >= total) return;
      if(revealed === 0) hintDiv.classList.add("show");
      const idx = revealed;
      const label = total > 1 ? `<span class="hint-label">Подсказка ${idx+1}:</span>` : "";
      const item = document.createElement("div");
      item.className = "hint-level";
      item.innerHTML = label + escapeHTML(skinText(hintList[idx]));
      hintDiv.appendChild(item);
      revealed++;
      if(revealed >= total){
        hintBtn.textContent = "💡 Все подсказки открыты";
        hintBtn.disabled = true;
      } else {
        hintBtn.textContent = `💡 Подсказка (${revealed+1}/${total})`;
      }
    });
  })();

  if(task.answerType === "choice"){
    document.querySelectorAll("#answers .opt").forEach(btn=>{
      btn.addEventListener("click", ()=> handleAnswer(task, btn.dataset.val, btn));
    });
  } else {
    const input = document.getElementById("numInput");
    const submit = (viaKeyboard)=>{
      const v = input.value.trim().replace(",", ".");
      if(v==="") return;
      handleAnswer(task, v, null, viaKeyboard);
    };
    document.getElementById("checkBtn").addEventListener("click", ()=> submit(false));
    input.addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); submit(true); } });
    input.focus();
  }
}

function normalize(s){ return String(s).trim().toLowerCase().replace(/\s+/g,"").replace(",", "."); }

function isCorrect(task, val){
  if(task.answerType === "numeric"){
    const a = parseFloat(String(task.answer));
    const b = parseFloat(val);
    if(!isNaN(a) && !isNaN(b)) return Math.abs(a-b) < 1e-6;
    return normalize(val) === normalize(task.answer);
  }
  return normalize(val) === normalize(task.answer);
}

function recordMistake(task){
  const snap = {
    mid: "m" + Date.now() + "_" + Math.floor(Math.random()*1000),
    ts: Date.now(),
    module: task.module, question: task.question, answerType: task.answerType,
    answer: task.answer, choices: task.choices ? task.choices.slice() : null,
    explanation: task.explanation, hint: task.hint, diff: task.diff,
    chess: !!task.chess, scratch: !!task.scratch, code: task.code || null,
    board: task.board ? task.board.slice() : null, turn: task.turn || null,
    blocksHTML: task.blocksHTML || null,
    spatial: !!task.spatial, spatialType: task.spatialType || null,
    puzzle: !!task.puzzle, puzzleType: task.puzzleType || null,
    visualHTML: task.visualHTML || null, choiceHTML: task.choiceHTML ? task.choiceHTML.slice() : null,
    noAnswerReveal: !!task.noAnswerReveal,
    hints: task.hints ? task.hints.slice() : null,
    topic: task.topic || null,
    // B1: интервальные повторения
    box: 0, due: Date.now(),
  };
  state.mistakes.push(snap);
  while(state.mistakes.length > 40) state.mistakes.shift();
}

// B1: Интервальные повторения (Leitner-style)
// box 0 → повтор сразу, 1 → 10 мин, 2 → 1 день, 3 → 3 дня, 4 → 7 дней → окончил
const SR_INTERVALS = [0, 1000*60*10, 1000*60*60*24, 1000*60*60*24*3, 1000*60*60*24*7];

function gradeMistake(mid, correct){
  const idx = state.mistakes.findIndex(m => m.mid === mid);
  if(idx === -1) return;
  const mst = state.mistakes[idx];
  const box = mst.box != null ? mst.box : 0;
  if(correct){
    const newBox = box + 1;
    if(newBox >= SR_INTERVALS.length){
      // выпускной — задача освоена, убираем
      state.mistakes.splice(idx, 1);
    } else {
      mst.box = newBox;
      mst.due = Date.now() + SR_INTERVALS[newBox];
    }
  } else {
    // сброс — вернуть в box 0, но с небольшой паузой чтобы не повторялась немедленно
    mst.box = 0;
    mst.due = Date.now() + 1500;
  }
  save();
}

function handleAnswer(task, val, btnEl, viaKeyboard){
  if(answered) return;
  answered = true;
  const correct = isCorrect(task, val);
  const res = applyResult(task.module, task.diff, correct);

  // A4: звук + анимации
  if(correct){
    playCorrect();
    pulseXp();
    if(state.streak > 0 && state.streak % 5 === 0) confetti();
  } else {
    playWrong();
  }

  // D1: реплика маскота
  if(correct) mascotSay(state.streak >= 3 ? pickLine(skinLines().streak) : pickLine(skinLines().correct));
  else mascotSay(pickLine(skinLines().wrong));

  // B3 + B1: учёт ошибок
  if(task.__mid){
    // SR или __review задача — оцениваем прогресс в Leitner-очереди
    gradeMistake(task.__mid, correct);
  } else if(!correct){
    // обычная задача, неверный ответ — записываем в очередь ошибок
    recordMistake(task);
  }

  // B4: учёт освоения тем
  if(task.topic){ recordTopicStat(task.topic, correct); save(); }

  refreshStats();
  announceBadges(res.badges);

  // подсветка вариантов
  if(task.answerType === "choice"){
    document.querySelectorAll("#answers .opt").forEach(b=>{
      b.disabled = true;
      if(normalize(b.dataset.val) === normalize(task.answer)) b.classList.add("correct");
      else if(b === btnEl) b.classList.add("wrong");
    });
  } else {
    const input = document.getElementById("numInput");
    const check = document.getElementById("checkBtn");
    if(input) input.disabled = true;
    if(check) check.disabled = true;
  }

  const fb = document.getElementById("feedback");
  fb.className = "feedback show " + (correct ? "ok" : "no");
  const deltaTxt = (res.delta>=0?"+":"") + res.delta;
  fb.innerHTML = `
    <div class="ttl ${correct?'ok':'no'}">${correct ? "✅ Верно!" : "❌ Не угадал"}</div>
    <div>${correct || task.noAnswerReveal ? "" : `Правильный ответ: <b>${escapeHTML(choiceLabel(task, task.answer, true))}</b>. `}${escapeHTML(skinText(task.explanation))}</div>
    <div class="delta">Рейтинг: ${deltaTxt}${correct?` • +${res.xpGain} XP`:""}${state.streak>1?` • серия 🔥 ${state.streak}`:""}</div>`;

  const actions = document.getElementById("actions");
  if(task.__review){
    actions.innerHTML = `
      <button class="btn" id="next">← К списку ошибок</button>
      <button class="btn ghost" id="menu">В меню</button>`;
    document.getElementById("next").addEventListener("click", renderReview);
  } else {
    actions.innerHTML = `
      <button class="btn" id="next">Следующая задача →</button>
      <button class="btn ghost" id="menu">В меню</button>`;
    document.getElementById("next").addEventListener("click", ()=> renderTask(task.module));
  }
  document.getElementById("menu").addEventListener("click", renderHome);
  if(!viaKeyboard) document.getElementById("next").focus();
}

function escapeHTML(s){ return String(s).replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeAttr(s){ return escapeHTML(s); }

/* ------------------------------------------------------------------ */
/*  A3: Спринт-режим (Puzzle Storm) — отдельный экран «на время».      */
/*  Поток задач из всех разделов, комбо-множитель очков, рекорды.      */
/*  XP начисляется, но на адаптивный рейтинг/серию/цель НЕ влияет.     */
/* ------------------------------------------------------------------ */
const SPRINT_DURATIONS = [1, 3, 5];
// Взвешенный пул разделов: быстрые встречаются чаще, длинные (олимпиада/шахматы) реже,
// чтобы темп «шторма» оставался бодрым при смешанном потоке.
const SPRINT_POOL = ["math","math","math","logic","logic","logic","physics","physics","code","code","chess","olympiad","spatial","spatial","puzzles"];
let sprint = null;          // активная сессия спринта (не сохраняется в localStorage)
let sprintTimerId = null;   // id интервала таймера
let sprintAdvanceId = null; // id таймаута перехода к следующей задаче
let sprintRecent = [];      // подписи недавних задач для анти-повтора

function sprintMult(combo){ return Math.min(5, 1 + Math.floor(combo / 3)); }

function clearSprintTimer(){
  if(sprintTimerId){ clearInterval(sprintTimerId); sprintTimerId = null; }
  if(sprintAdvanceId){ clearTimeout(sprintAdvanceId); sprintAdvanceId = null; }
  if(sprint) sprint.active = false;
}

// Генерация задачи для спринта: случайный раздел, сложность — по текущему рейтингу,
// без побочных эффектов на рейтинг/SR. Лёгкий анти-повтор по подписи.
function sprintGenerate(){
  let task, sig, tries = 0;
  do {
    const moduleId = pick(SPRINT_POOL);
    const diff = Math.min(ratingToDiff(state.ratings[moduleId]), moduleMaxDiff(moduleId));
    task = genOnce(moduleId, diff);
    task.diff = task.diffOverride || diff;
    task.module = moduleId;
    sig = taskSignature(task);
    tries++;
  } while(sprintRecent.includes(sig) && tries < 25);
  sprintRecent.push(sig);
  while(sprintRecent.length > 8) sprintRecent.shift();
  return task;
}

function startSprint(durationMin){
  clearSprintTimer();
  const ac = audioCtx(); if(ac && ac.state === "suspended") ac.resume();
  sprintRecent = [];
  sprint = {
    durationMin, active: true, ended: false,
    score: 0, combo: 0, maxCombo: 0, solved: 0, errors: 0,
    current: null, answered: false,
    endAt: Date.now() + durationMin * 60 * 1000,
  };
  renderSprintRun();
}

function renderSprintRun(){
  app.innerHTML = `
    <div class="panel fade-in sprint-run">
      <div class="taskhead">
        <button class="backbtn" id="quit">← Завершить</button>
        <span class="badge">⚡ Спринт • ${sprint.durationMin} мин</span>
      </div>

function sprintTick(){
  if(!sprint || !sprint.active) return;
  const remMs = Math.max(0, sprint.endAt - Date.now());
  const bar = document.getElementById("spTimeBar");
  const num = document.getElementById("spTimeNum");
  if(bar) bar.style.width = (remMs / (sprint.durationMin * 60000) * 100) + "%";
  if(num) num.textContent = Math.ceil(remMs / 1000) + " с";
  if(remMs <= 0) endSprint();
}

function sprintNextTask(){
  if(!sprint || !sprint.active) return;
  const task = sprintGenerate();
  sprint.current = task;
  sprint.answered = false;

  let body = "";
  if(task.chess){
    body += `<div class="turninfo">Ход: ${task.turn}</div>`;
    body += boardHTML(task.board);
  }
  body += `<div class="qtype">${task.chess ? "Шахматы" : task.scratch ? "Scratch" : MODULES[task.module].title} • ур. ${task.diff}</div>`;
  body += `<div class="question">${skinText(task.question)}</div>`;
  if(task.scratch){ body += `<div class="sb-script">${task.blocksHTML}</div>`; }
  else if(task.code){ body += `<pre class="code">${hl(task.code)}</pre>`; }

  if(task.visualHTML){ body += `<div class="spatial-visual">${task.visualHTML}</div>`; }

  let answerArea;
  if(task.answerType === "choice"){
    answerArea = `<div class="answers${task.choiceHTML ? " visual-answers" : ""}" id="spAnswers">` +
      task.choices.map((c,i)=>`<button class="opt${task.choiceHTML ? " visual" : ""}" data-val="${escapeAttr(c)}">${task.choiceHTML ? task.choiceHTML[i] : escapeHTML(choiceLabel(task, c))}</button>`).join("") +
      `</div>`;
  } else {
    answerArea = `<div class="numrow">
        <input class="num" id="spNum" type="text" inputmode="numeric" autocomplete="off" placeholder="Введи ответ…" />
        <button class="btn" id="spCheck">→</button>
      </div>`;
  }

  const host = document.getElementById("sprintTask");
  host.innerHTML = body + answerArea;

  if(task.answerType === "choice"){
    host.querySelectorAll("#spAnswers .opt").forEach(b=>{
      b.addEventListener("click", ()=> sprintAnswer(task, b.dataset.val, b));
    });
  } else {
    const input = document.getElementById("spNum");
    const submit = ()=>{
      const v = input.value.trim().replace(",", ".");
      if(v === "") return;
      sprintAnswer(task, v, null);
    };
    document.getElementById("spCheck").addEventListener("click", submit);
    input.addEventListener("keydown", e=>{ if(e.key === "Enter"){ e.preventDefault(); submit(); } });
    input.focus();
  }
}

function sprintFlashPoints(pts, mult){
  const box = document.querySelector(".sp-scorebox");
  if(!box) return;
  const el = document.createElement("div");
  el.className = "sp-pop";
  el.textContent = `+${pts}${mult > 1 ? ` ×${mult}` : ""}`;
  box.appendChild(el);
  setTimeout(()=> el.remove(), 720);
}

function sprintAnswer(task, val, btn){
  if(!sprint || !sprint.active || sprint.answered) return;
  sprint.answered = true;
  const correct = isCorrect(task, val);

  if(correct){
    sprint.combo += 1;
    sprint.maxCombo = Math.max(sprint.maxCombo, sprint.combo);
    const mult = sprintMult(sprint.combo);
    const pts = Math.round((10 + task.diff * 2) * mult);
    sprint.score += pts;
    sprint.solved += 1;
    playCorrect();
    sprintFlashPoints(pts, mult);
  } else {
    sprint.combo = 0;
    sprint.errors += 1;
    playWrong();
  }

  // обновляем HUD
  const sEl = document.getElementById("spScore"); if(sEl) sEl.textContent = sprint.score;
  const mult = sprintMult(sprint.combo);
  const cEl = document.getElementById("spCombo"); if(cEl){ cEl.textContent = "×" + mult; cEl.className = "sp-combo c" + mult; }

  // подсветка ответа
  if(task.answerType === "choice"){
    document.querySelectorAll("#spAnswers .opt").forEach(b=>{
      b.disabled = true;
      if(normalize(b.dataset.val) === normalize(task.answer)) b.classList.add("correct");
      else if(b === btn) b.classList.add("wrong");
    });
  } else {
    const input = document.getElementById("spNum");
    const check = document.getElementById("spCheck");
    if(input){ input.disabled = true; input.classList.add(correct ? "sp-ok" : "sp-no"); }
    if(check) check.disabled = true;
    if(!correct){
      const host = document.getElementById("sprintTask");
      if(host) host.insertAdjacentHTML("beforeend", `<div class="sp-correct">Верно: <b>${escapeHTML(choiceLabel(task, task.answer))}</b></div>`);
    }
  }

  const delay = correct ? 430 : 950; // на ошибке держим дольше, чтобы успеть увидеть верный ответ
  sprintAdvanceId = setTimeout(()=>{ sprintAdvanceId = null; sprintNextTask(); }, delay);
}

function endSprint(){
  if(!sprint || sprint.ended) return;
  sprint.ended = true; sprint.active = false;
  if(sprintTimerId){ clearInterval(sprintTimerId); sprintTimerId = null; }
  if(sprintAdvanceId){ clearTimeout(sprintAdvanceId); sprintAdvanceId = null; }

  const xpEarned = sprint.score;
  state.xp += xpEarned;
  const key = String(sprint.durationMin);
  const prev = state.sprintRecords[key];
  const isRecord = sprint.score > 0 && (!prev || sprint.score > prev.score);
  if(isRecord){
    state.sprintRecords[key] = { score: sprint.score, maxCombo: sprint.maxCombo, solved: sprint.solved, ts: Date.now() };
  }
  save(); refreshStats(); pulseXp();

  renderSprintEnd({
    durationMin: sprint.durationMin, score: sprint.score, maxCombo: sprint.maxCombo,
    solved: sprint.solved, errors: sprint.errors, xpEarned, isRecord,
    best: state.sprintRecords[key] || null,
  });
}

/* ------------------------------------------------------------------ */
/*  Босс-битва — PK-дуэль против бота. Отдельный экран: две полоски HP. */

/* ------------------------------------------------------------------ */

let boss = null;          // активная битва (не сохраняется в localStorage)
let bossTimerId = null;   // id интервала «зарядки» атаки босса
let bossAdvanceId = null; // id таймаута перехода к следующей задаче / финалу
let bossRecent = [];      // анти-повтор задач

function clearBossTimer(){
  if(bossTimerId){ clearInterval(bossTimerId); bossTimerId = null; }
  if(bossAdvanceId){ clearTimeout(bossAdvanceId); bossAdvanceId = null; }
  if(boss) boss.active = false;
}

function bossGenerate(){
  let task, sig, tries = 0;
  do {
    const moduleId = pick(SPRINT_POOL);
    const diff = Math.min(ratingToDiff(state.ratings[moduleId]), moduleMaxDiff(moduleId));
    task = genOnce(moduleId, diff);
    task.diff = task.diffOverride || diff;
    task.module = moduleId;
    sig = taskSignature(task);
    tries++;
  } while(bossRecent.includes(sig) && tries < 25);
  bossRecent.push(sig);
  while(bossRecent.length > 8) bossRecent.shift();
  return task;
}

function renderBossIntro(){
  clearSprintTimer(); clearBossTimer(); boss = null;
  refreshStats();
  const cards = BOSSES.map(b=>{
    const st = state.bossStats[b.id];
    const stats = st && (st.wins || st.losses)
      ? `Побед: <b>${st.wins}</b> • поражений: ${st.losses}${st.wins ? ` • лучший запас HP: <b>${st.bestHp}</b>` : ""}`
      : "ещё не сражался";
    return `<div class="bs-card" data-boss="${b.id}">
        ${b.svg}
        <div class="bs-card-name">${b.name}</div>
        <div class="bs-card-sub">${b.sub}<br>HP ${b.hp} • удар ${b.dmg}</div>
        <div class="bs-card-stats">${stats}</div>
      </div>`;
  }).join("");
  app.innerHTML = `
    <div class="taskhead" style="margin-bottom:14px">
      <button class="backbtn" id="back">← В меню</button>
      <span class="badge">🐲 Босс-битва</span>
    </div>
    <div class="panel fade-in">
      <div class="question" style="margin-bottom:6px">🐲 Выбери противника</div>
      <p style="color:var(--muted); line-height:1.6; margin:0 0 18px">
        У тебя и босса — полоски HP. Верный ответ бьёт босса: чем выше уровень задачи и чем быстрее ответ,
        тем больнее; каждый 3-й верный подряд — <b style="color:var(--red)">крит ×2</b>.
        Ошибся или не успел до конца полоски атаки — босс бьёт тебя.
        Режим отдельный: на рейтинг и серию не влияет, XP за победу начисляется.
      </p>
      <div class="bs-cards">${cards}</div>
    </div>`;
  document.getElementById("back").addEventListener("click", renderHome);
  document.querySelectorAll(".bs-card").forEach(c=>{
    c.addEventListener("click", ()=> startBoss(c.dataset.boss));
  });
}

function startBoss(bossId){
  clearBossTimer();
  const def = BOSSES.find(b=> b.id === bossId);
  if(!def) return;
  const ac = audioCtx(); if(ac && ac.state === "suspended") ac.resume();
  bossRecent = [];
  boss = {
    def, active: true, ended: false,
    bossHp: def.hp, meHp: BOSS_PLAYER_HP,
    combo: 0, solved: 0, errors: 0, maxHit: 0,
    current: null, answered: false, taskStartAt: 0, taskEndAt: 0,
  };
  renderBossRun();
}

function renderBossRun(){
  app.innerHTML = `
    <div class="panel fade-in">
      <div class="taskhead">
        <button class="backbtn" id="flee">🏳️ Сдаться</button>
        <span class="badge">🐲 Босс-битва • ${boss.def.name}</span>
      </div>
      <div class="bs-arena">
        <div class="bs-art" id="bsArt">${boss.def.svg}</div>
        <div class="bs-name">${boss.def.name}</div>
        <div class="bs-hprow">
          <span class="bs-hplbl">Босс</span>
          <div class="bs-hpbar boss"><span id="bsBossHp"></span></div>
          <span class="bs-hpnum" id="bsBossHpNum"></span>
        </div>
        <div class="bs-merow" id="bsMeRow">
          <div class="bs-hprow" style="margin-top:0">
            <span class="bs-hplbl">Ты</span>
            <div class="bs-hpbar me"><span id="bsMeHp"></span></div>
            <span class="bs-hpnum" id="bsMeHpNum"></span>
          </div>
        </div>
        <div class="bs-charge"><span id="bsCharge"></span></div>
        <div class="bs-charge-lbl" id="bsChargeLbl"></div>
      </div>
      <div id="bossTask"></div>
    </div>`;
  document.getElementById("flee").addEventListener("click", ()=>{
    if(confirm("Сбежать из битвы? Результат не сохранится.")){ renderBossIntro(); }
  });
  bossHud();
  bossTimerId = setInterval(bossTick, 100);
  bossNextTask();
}

function bossHud(){
  const bHp = document.getElementById("bsBossHp");
  const bNum = document.getElementById("bsBossHpNum");
  const mHp = document.getElementById("bsMeHp");
  const mNum = document.getElementById("bsMeHpNum");
  if(bHp) bHp.style.width = Math.max(0, boss.bossHp / boss.def.hp * 100) + "%";
  if(bNum) bNum.textContent = Math.max(0, boss.bossHp) + "/" + boss.def.hp;
  if(mHp) mHp.style.width = Math.max(0, boss.meHp / BOSS_PLAYER_HP * 100) + "%";
  if(mNum) mNum.textContent = Math.max(0, boss.meHp) + "/" + BOSS_PLAYER_HP;
}

function bossTick(){
  if(!boss || !boss.active || boss.answered || !boss.taskEndAt) return;
  const total = boss.taskEndAt - boss.taskStartAt;
  const remMs = Math.max(0, boss.taskEndAt - Date.now());
  const bar = document.getElementById("bsCharge");
  const lbl = document.getElementById("bsChargeLbl");
  if(bar) bar.style.width = ((total - remMs) / total * 100) + "%";
  if(lbl) lbl.textContent = "Босс ударит через " + Math.ceil(remMs / 1000) + " с";
  if(remMs <= 0) bossTimeout();
}

function bossPop(hostId, text, cls){
  const host = document.getElementById(hostId);
  if(!host) return;
  const el = document.createElement("div");
  el.className = "bs-pop" + (cls ? " " + cls : "");
  el.textContent = text;
  host.appendChild(el);
  setTimeout(()=> el.remove(), 820);
}

function bossNextTask(){
  if(!boss || !boss.active) return;
  const task = bossGenerate();
  boss.current = task;
  boss.answered = false;
  const limit = Math.round((boss.def.baseMs + task.diff * boss.def.perDiffMs) * (BOSS_SLOW_MODULES[task.module] || 1));
  boss.taskStartAt = Date.now();
  boss.taskEndAt = boss.taskStartAt + limit;

  let body = "";
  if(task.chess){
    body += `<div class="turninfo">Ход: ${task.turn}</div>`;
    body += boardHTML(task.board);
  }
  body += `<div class="qtype">${task.chess ? "Шахматы" : task.scratch ? "Scratch" : MODULES[task.module].title} • ур. ${task.diff}</div>`;
  body += `<div class="question">${skinText(task.question)}</div>`;
  if(task.scratch){ body += `<div class="sb-script">${task.blocksHTML}</div>`; }
  else if(task.code){ body += `<pre class="code">${hl(task.code)}</pre>`; }

  if(task.visualHTML){ body += `<div class="spatial-visual">${task.visualHTML}</div>`; }

  let answerArea;
  if(task.answerType === "choice"){
    answerArea = `<div class="answers${task.choiceHTML ? " visual-answers" : ""}" id="bsAnswers">` +
      task.choices.map((c,i)=>`<button class="opt${task.choiceHTML ? " visual" : ""}" data-val="${escapeAttr(c)}">${task.choiceHTML ? task.choiceHTML[i] : escapeHTML(choiceLabel(task, c))}</button>`).join("") +
      `</div>`;
  } else {
    answerArea = `<div class="numrow">
        <input class="num" id="bsNum" type="text" inputmode="numeric" autocomplete="off" placeholder="Введи ответ…" />
        <button class="btn" id="bsCheck">→</button>
      </div>`;
  }

  const host = document.getElementById("bossTask");
  host.innerHTML = body + answerArea;

  if(task.answerType === "choice"){
    host.querySelectorAll("#bsAnswers .opt").forEach(b=>{
      b.addEventListener("click", ()=> bossAnswer(task, b.dataset.val, b));
    });
  } else {
    const input = document.getElementById("bsNum");
    const submit = ()=>{
      const v = input.value.trim().replace(",", ".");
      if(v === "") return;
      bossAnswer(task, v, null);
    };
    document.getElementById("bsCheck").addEventListener("click", submit);
    input.addEventListener("keydown", e=>{ if(e.key === "Enter"){ e.preventDefault(); submit(); } });
    input.focus();
  }
  bossTick();
}

// Блокировка ответа + показ верного (после ошибки/таймаута — как в спринте)
function bossLockTask(task, btn, correct){
  if(task.answerType === "choice"){
    document.querySelectorAll("#bsAnswers .opt").forEach(b=>{
      b.disabled = true;
      if(normalize(b.dataset.val) === normalize(task.answer)) b.classList.add("correct");
      else if(b === btn) b.classList.add("wrong");
    });
  } else {
    const input = document.getElementById("bsNum");
    const check = document.getElementById("bsCheck");
    if(input){ input.disabled = true; input.classList.add(correct ? "sp-ok" : "sp-no"); }
    if(check) check.disabled = true;
    if(!correct){
      const host = document.getElementById("bossTask");
      if(host) host.insertAdjacentHTML("beforeend", `<div class="sp-correct">Верно: <b>${escapeHTML(choiceLabel(task, task.answer))}</b></div>`);
    }
  }
}

function bossAnswer(task, val, btn){
  if(!boss || !boss.active || boss.answered) return;
  boss.answered = true;
  const correct = isCorrect(task, val);
  bossLockTask(task, btn, correct);
  if(correct){
    boss.solved += 1;
    boss.combo += 1;
    const remFrac = Math.max(0, boss.taskEndAt - Date.now()) / (boss.taskEndAt - boss.taskStartAt);
    const crit = boss.combo > 0 && boss.combo % 3 === 0;
    let dmg = 10 + task.diff + Math.round(remFrac * 6);
    if(crit) dmg *= 2;
    boss.maxHit = Math.max(boss.maxHit, dmg);
    boss.bossHp -= dmg;
    playCorrect();
    bossPop("bsArt", (crit ? "КРИТ! " : "") + "−" + dmg, crit ? "crit" : "");
    const art = document.getElementById("bsArt");
    if(art){ art.classList.add("hit"); setTimeout(()=> art.classList.remove("hit"), 450); }
    bossHud();
    if(boss.bossHp <= 0){
      if(art) art.classList.add("dead");
      bossAdvanceId = setTimeout(()=>{ bossAdvanceId = null; endBoss(true); }, 850);
      return;
    }
    bossAdvanceId = setTimeout(()=>{ bossAdvanceId = null; bossNextTask(); }, 500);
  } else {
    boss.combo = 0;
    boss.errors += 1;
    bossStrike();
  }
}

function bossTimeout(){
  if(!boss || !boss.active || boss.answered) return;
  boss.answered = true;
  boss.combo = 0;
  boss.errors += 1;
  bossLockTask(boss.current, null, false);
  const host = document.getElementById("bossTask");
  if(host) host.insertAdjacentHTML("beforeend", `<div class="sp-correct">⏰ Время вышло!</div>`);
  bossStrike();
}

// Босс бьёт игрока (после ошибки или таймаута)
function bossStrike(){
  boss.meHp -= boss.def.dmg;
  playWrong();
  bossPop("bsMeRow", "−" + boss.def.dmg, "hurt");
  const row = document.getElementById("bsMeRow");
  if(row){ row.classList.add("hit"); setTimeout(()=> row.classList.remove("hit"), 450); }
  bossHud();
  if(boss.meHp <= 0){
    bossAdvanceId = setTimeout(()=>{ bossAdvanceId = null; endBoss(false); }, 850);
  } else {
    bossAdvanceId = setTimeout(()=>{ bossAdvanceId = null; bossNextTask(); }, 1100);
  }
}

function endBoss(win){
  if(!boss || boss.ended) return;
  boss.ended = true; boss.active = false;
  if(bossTimerId){ clearInterval(bossTimerId); bossTimerId = null; }
  if(bossAdvanceId){ clearTimeout(bossAdvanceId); bossAdvanceId = null; }

  const st = state.bossStats[boss.def.id] || { wins: 0, losses: 0, bestHp: 0 };
  let isRecord = false;
  if(win){
    st.wins += 1;
    if(boss.meHp > st.bestHp){ st.bestHp = boss.meHp; isRecord = st.wins > 1; }
  } else {
    st.losses += 1;
  }
  state.bossStats[boss.def.id] = st;

  const xpEarned = win ? boss.def.xp + Math.round(boss.meHp / 2) : boss.solved * 3;
  state.xp += xpEarned;
  save(); refreshStats(); pulseXp();

  renderBossEnd({
    win, def: boss.def, meHp: Math.max(0, boss.meHp), solved: boss.solved,
    errors: boss.errors, maxHit: boss.maxHit, xpEarned, isRecord,
  });
}

function renderBossEnd(r){
  app.innerHTML = `
    <div class="taskhead" style="margin-bottom:14px">
      <button class="backbtn" id="back">← В меню</button>
      <span class="badge">🐲 Босс-битва • ${r.def.name}</span>
    </div>
    <div class="panel fade-in sprint-end">
      <div class="bs-result-art" style="${r.win ? "filter:grayscale(1) opacity(.45)" : ""}">${r.def.svg}</div>
      <div class="se-big" style="color:${r.win ? "var(--green)" : "var(--red)"}">${r.win ? "ПОБЕДА!" : "Поражение…"}</div>
      <div class="se-lbl">${r.win ? `${r.def.name} повержен!` : `${r.def.name} оказался сильнее. Реванш?`}</div>
      ${r.isRecord ? `<div class="se-record">🏆 Новый рекорд: запас HP ${r.meHp}!</div>` : ""}
      <div class="se-rows">
        <div class="se-row"><span>Решено задач</span><b>${r.solved}</b></div>
        <div class="se-row"><span>Ошибок и таймаутов</span><b>${r.errors}</b></div>
        <div class="se-row"><span>Самый сильный удар</span><b>${r.maxHit}</b></div>
        ${r.win ? `<div class="se-row"><span>Осталось HP</span><b>${r.meHp}/${BOSS_PLAYER_HP}</b></div>` : ""}
        <div class="se-row"><span>Заработано XP</span><b>+${r.xpEarned}</b></div>
      </div>
      <div class="se-actions">
        <button class="btn" id="again">⚔️ ${r.win ? "Ещё раз" : "Реванш"}</button>
        <button class="btn ghost" id="other">Другой босс</button>
        <button class="btn ghost" id="menu">В меню</button>
      </div>
    </div>`;
  document.getElementById("back").addEventListener("click", renderHome);
  document.getElementById("menu").addEventListener("click", renderHome);
  document.getElementById("other").addEventListener("click", renderBossIntro);
  document.getElementById("again").addEventListener("click", ()=> startBoss(r.def.id));
  if(r.win){
    confetti(); playFanfare();
    setTimeout(()=> mascotSay(`${r.def.name} повержен! ⚔️ Ты настоящий герой!`), 400);
  } else {
    setTimeout(()=> mascotSay("Боссы с виду страшные, но реванш решает всё! 💪"), 400);
  }
}

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("Сбросить весь прогресс (XP, рейтинги, серию)?")){
    state = defaultState(); save(); applyTheme(); renderHome();
  }
});

applyTheme();
renderHome();
</script>
